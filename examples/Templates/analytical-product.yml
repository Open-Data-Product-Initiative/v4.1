schema: https://opendataproducts.org/v4.1/schema/odps.yaml
version: 4.1
product:
  details:
    en:
      name: "{{name}}"
      productID: "{{productID}}"
      visibility: "{{enum: private | invitation | organisation | dataspace | public}}"
      status: "{{enum: announcement | draft | development | testing | acceptance | production | sunset | retired}}"
      type: "{{enum: raw data | derived data | dataset | reports | analytic view | 3D visualisation | algorithm | decision support | automated decision-making | data-enhanced product | data-driven service | data-enabled performance | bi-directional}}"
      description: "{{description}}"
      valueProposition: "{{valueProposition}}"
      productVersion: "{{string: semver}}"
      portfolioPriority: "{{enum: critical | high | medium | low}}"
      governanceProfile: "{{enum: structured | enforced | automated | audit_ready}}"
      useCases:
        - useCase:
            useCaseTitle: "{{useCaseTitle}}"
            useCaseDescription: "{{useCaseDescription}}"
            useCaseURL: "{{useCaseUrl}}"

  dataHolder:
    en:
      legalName: "{{legalName}}"
      businessDomain: "{{businessDomain}}"
      contactName: "{{contactName}}"
      email: "{{email}}"

  productStrategy:
    status: "{{enum: Planned | Active | At Risk | Achieved | Partially Achieved | Cancelled | Expired}}"
    objectives:
      - en: "{{businessObjective}}"
    contributesToKPI:
      id: "{{businessKpiId}}"
      name: "{{businessKpiName}}"
      unit: "{{businessKpiUnit}}"
      target: "{{businessKpiTarget}}"
      direction: "{{enum: increase | decrease | at_least | at_most | equals}}"
      timeframe: "{{timeframe}}"
      frequency: "{{string}}"
      owner: "{{owner}}"
      calculation: "{{calculation}}"
    productKPIs:
      - id: "{{productKpiId}}"
        name: "{{productKpiName}}"
        unit: "{{productKpiUnit}}"
        target: "{{productKpiTarget}}"
        calculation: "{{productKpiCalculation}}"
        direction: "{{enum: increase | decrease | at_least | at_most | equals}}"
        frequency: "{{string}}"
        owner: "{{owner}}"

  dataQuality:
    declarative:
      default:
        displaytitle:
          en: "{{string}}"
        description:
          en: "{{string}}"
        dimensions:
          - dimension: "{{enum: accuracy | completeness | conformity | consistency | coverage | timeliness | validity | uniqueness}}"
            objective: "{{integer}}"
            weight: "{{integer}}"
            unit: "{{enum: percentage | number}}"

  SLA:
    declarative:
      default:
        name:
          en: "{{string}}"
        description:
          en: "{{string}}"
        dimensions:
          - dimension: "{{enum: latency | uptime | responseTime | errorRate | endOfSupport | endOfLife | updateFrequency | timeToDetect | timeToNotify | timeToRepair | emailResponseTime}}"
            objective: "{{integer}}"
            weight: "{{integer}}"
            unit: "{{string}}"

  dataAccess:
    default:
      name:
        en: "{{string}}"
      description:
        en: "{{string}}"
      outputPorttype: "{{enum: file | API | SQL | AI | gRPC | sFTP}}"
      format: "{{enum: TOON | JSON | XML | CSV | Excel | zip | plain text | GraphQL | MCP}}"
      authenticationMethod: "{{enum: OAuth | Token | API key | HTTP Basic | none}}"
      specification: "{{enum: OAS | RAML | Slate | MCP}}"
      specsURL: "{{specsUrl}}"
      accessURL: "{{accessUrl}}"
      documentationURL: "{{documentationUrl}}"
